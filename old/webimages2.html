<html>
<head>
    <link rel="stylesheet" href="css/jsAnimation.css">
    <title>Image Player</title>
</head>
<body>
    <script>
        function Player() {
            var rotator=document.getElementById('slideshow_content');
            var images=rotator.getElementsByTagName('img');
            var intervalID;
            var counter=1;

            function animate() {
                var i;

                for (i=0; i<images.length; i++) {
                    images[i].style.display='none';
                }

                images[counter].style.display='block';

                counter++;

                if (counter==images.length) {
                    counter=0;
                }
            }

            this.pause=function () {
                if (undefined!==intervalID) {
                    window.clearInterval(intervalID);
                    intervalID=undefined;
                }
            };

            this.next=function () {
                if (undefined!==intervalID) {
                    window.clearInterval(intervalID);
                    interval=undefined;
                }
            }

            this.stop=function () {
                this.pause();

                for (var i=1; i<images.length; i++) {
                    images[i].style.display='none';
                }
            };

            this.play=function () {
                if (undefined===intervalID) {
                    intervalID=window.setInterval(animate, 1000);
                }
            };

            this.stop();
            this.currentTime=0;
        }

    </script>
    <script>
        function playimage() {
            player.play();
        }

        function pauseimage() {
            player.pause();
        }

        function stopimage() {
            player.stop();
            player.currentTime=0;
        }

        function nextimage() {
            player.next();
            
        }

        function Page_Load() {
            player=new Player();
            player.play();
        }

        document.onreadystatechange=function () {
            if ('complete'==document.readyState) {
                Page_Load();
            }
        };

        var player; 

    </script>
    <div id='slideshow'>
        <div id='slideshow_content' width='1' height='11' style='padding-top: 0px; padding-bottom: 1px; float:"right"'>
            <button type="button" class="btn btn-primary btn-xs" onclick="anim.first_frame()">       <span class="glyphicon glyphicon-fast-backward"></span></button>
                      <button type="button" class="btn btn-primary btn-xs" onclick="anim.previous_frame()">    <span class="glyphicon glyphicon-step-backward"></span></button>
                      <button type="button" class="btn btn-primary btn-xs" onclick="anim.reverse_animation()"> <span class="glyphicon glyphicon-triangle-left"></span></button>
                      <button type="button" class="btn btn-primary btn-xs" onclick="anim.pause_animation()">   <span class="glyphicon glyphicon-pause"></span></button>
                      <button type="button" class="btn btn-primary btn-xs" onclick="anim.play_animation()">    <span class="glyphicon glyphicon-triangle-right"></span></button>
                      <button type="button" class="btn btn-primary btn-xs" onclick="anim.next_frame()">        <span class="glyphicon glyphicon-step-forward"></span></button>
                      <button type="button" class="btn btn-primary btn-xs" onclick="anim.last_frame()">        <span class="glyphicon glyphicon-fast-forward"></span></button>
