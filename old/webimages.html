<html>
<head>
    <link rel="stylesheet" href="css/jsAnimation.css">
    <title>Image Player</title>
</head>
<body>
    <script>
        function Player() {
            var rotator=document.getElementById('slideshow_content');
            var images=rotator.getElementsByTagName('img');
            var intervalID;
            var counter=1;

            function animate() {
                var i;

                for (i=0; i<images.length; i++) {
                    images[i].style.display='none';
                }

                images[counter].style.display='block';

                counter++;

                if (counter==images.length) {
                    counter=0;
                }
            }

            this.pause=function () {
                if (undefined!==intervalID) {
                    window.clearInterval(intervalID);
                    intervalID=undefined;
                }
            };


            this.stop=function () {
                this.pause();

                for (var i=1; i<images.length; i++) {
                    images[i].style.display='none';
                }
            };

            this.play=function () {
                if (undefined===intervalID) {
                    intervalID=window.setInterval(animate, 1000);
                }
            };

            this.stop();
            this.currentTime=0;
        }

    </script>
    <script>
        function playimage() {
            player.play();
        }

        function pauseimage() {
            player.pause();
        }

        function stopimage() {
            player.stop();
            player.currentTime=0;
        }

        function Page_Load() {
            player=new Player();
            player.play();
        }

        document.onreadystatechange=function () {
            if ('complete'==document.readyState) {
                Page_Load();
            }
        };

        var player; 

    </script>
    <div id='slideshow'>
        <div id='slideshow_content' width='1' height='5' style='padding-top: 5px; padding-bottom: 5px; float:"left"'>
            <input type='button' value='Play' style="height:40" width="4800" onclick='playimage(); float:"right"' />
            <input type='button' value='Pause' style="height:40" style="width:200" onclick='pauseimage(); float:"right"' /> 
            <input type='button' value='Stop' style="height:40" style="width:200" class="center" onclick='stopimage(); float:"right"' />
            <img src='/home/climdes1/WRF/ARWpost/01-WRF-00z-24h.jpg' style="width:1050" height="600", class="center" />
            <img src='/home/climdes1/WRF/ARWpost/02-WRF-00z-48h.jpg' style="width:1050" height="600", class="center" />
            <img src='/home/climdes1/WRF/ARWpost/03-WRF-00z-72h.jpg' style="width:1050" height="600", class="center" />
            
    </div>
        
    </div>
    
</body>
</html>
